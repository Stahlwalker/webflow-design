* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #080808;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 40px;
}
#label {
  color: #363636;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: 'Inter', monospace;
  font-weight: 500;
}
#wrap { width: min(1200px, 100%); }
canvas { display: block; width: 100%; height: auto; }
#dl {
  background: #146EF5;
  color: #fff;
  border: none;
  padding: 10px 28px;
  font-family: 'WF Visual Sans', 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 500;
  border-radius: 0;
  cursor: pointer;
  letter-spacing: 0.02em;
}
#dl:hover { background: #1560d8; }
</style>
</head>

<div id="label">OG / Blog &mdash; 1200&times;630</div>
<div id="wrap"><canvas id="c"></canvas></div>

async function loadFonts() {
  const faces = [
    ['WF Visual Sans', 'WFVisualSans-SemiBold.otf', '600'],
    ['WF Visual Sans', 'WFVisualSans-Medium.otf', '500'],
    ['WF Visual Sans', 'WFVisualSans-Regular.otf', '400'],
    ['WF Visual Sans Text', 'WFVisualSans-RegularText.otf', '400'],
    ['WF Visual Sans Text', 'WFVisualSans-SemiBoldText.otf', '600'],
  ];
  await Promise.all(faces.map(([name, file, weight]) => {
    const face = new FontFace(name, `url(webflow-brand/fonts/OTF/${file})`, { weight });
    return face.load().then(f => document.fonts.add(f)).catch(() => {});
  }));
}

const BLUE  = '#146EF5';
const BLACK = '#080808';
const WHITE = '#FFFFFF';
const G900  = '#171717';
const G800  = '#222222';
const G700  = '#363636';
const G600  = '#5A5A5A';
const G400  = '#898989';

const imgCache = {};
function loadImg(src) {
  if (imgCache[src]) return Promise.resolve(imgCache[src]);
  return new Promise(r => {
    const img = new Image();
    img.onload  = () => { imgCache[src] = img; r(img); };
    img.onerror = () => r(null);
    img.src = src;
  });
}

// Draw faint syntax-highlighted code blocks in background

  const lines = [

    { text: 'webflow',       x: 117,  y: 68,  color: WHITE, alpha: 0.12, size: 13 },

// Terminal window chrome
function drawTerminal(x, y, w, h) {
  ctx.save();
  // Panel bg
  ctx.fillStyle = G900;
  ctx.strokeStyle = G700;
  ctx.lineWidth = 1;
  ctx.fillRect(x, y, w, h);
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);

  // Title bar
  const barH = 32;
  ctx.fillStyle = G800;
  ctx.fillRect(x, y, w, barH);
  // Bottom border of bar
  ctx.strokeStyle = G700;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y + barH);
  ctx.lineTo(x + w, y + barH);
  ctx.stroke();

  // Dots
  const dotY = y + barH / 2;
  const dotR = 5;
  const dots = [x + 18, x + 36, x + 54];
  dots.forEach(dx => {
    ctx.beginPath();
    ctx.arc(dx, dotY, dotR, 0, Math.PI * 2);
    ctx.fillStyle = G600;
    ctx.fill();
  });

  // Filename
  ctx.font = '12px "Courier New", monospace';
  ctx.fillStyle = G400;
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';
  ctx.fillText('integration.js', x + w / 2, y + barH / 2 + 4);
  ctx.textAlign = 'left';
  ctx.restore();
}

function drawVignette() {
  const g = ctx.createRadialGradient(W/2, H/2, 80, W/2, H/2, W * 0.7);
  g.addColorStop(0,   'rgba(0,0,0,0)');
  g.addColorStop(0.7, 'rgba(0,0,0,0)');
  g.addColorStop(1,   'rgba(0,0,0,0.55)');
  ctx.save();
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

// Subtle dot grid
function drawGrid() {
  ctx.save();
  ctx.fillStyle = WHITE;
  ctx.globalAlpha = 0.025;
  const sp = 36;
  for (let x = sp; x < W; x += sp)
    for (let y = sp; y < H; y += sp) {
      ctx.beginPath();
      ctx.arc(x, y, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  ctx.restore();
}

async function draw() {
  // Background
  ctx.fillStyle = BLACK;
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawCodeBg();

  // Terminal window — center region
  const panW = 560, panH = 280;
  const panX = (W - panW) / 2;
  const panY = (H - panH) / 2 - 20;
  drawTerminal(panX, panY, panW, panH);

  // Load logos
  const wfImg    = await loadImg('webflow-brand/logos/Mark_Logo_Blue.png');
  const sparkImg = await loadImg(SPARK);

  // Logo positions inside panel
  const barH = 32;
  const innerY = panY + barH + (panH - barH) / 2; // vertical center of panel body
  const SIZE = 120;
  const SPREAD = 110;
  const MID_X = W / 2;

  function stamp(img, cx, cy) {
    if (!img) return;
    const s  = Math.min(SIZE / img.naturalWidth, SIZE / img.naturalHeight);
    const lw = img.naturalWidth  * s;
    const lh = img.naturalHeight * s;
    ctx.drawImage(img, cx - lw/2, cy - lh/2, lw, lh);
  }

  if (wfImg)    stamp(wfImg,    MID_X - SPREAD, innerY);
  if (sparkImg) stamp(sparkImg, MID_X + SPREAD, innerY);

  // + operator
  ctx.save();
  ctx.font = `300 28px 'WF Visual Sans', 'Poppins', sans-serif`;
  ctx.fillStyle = G600;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('+', MID_X, innerY);
  ctx.restore();

  drawVignette();

  // Headline — below terminal, monospace flavor via font weight + spacing
  ctx.save();
  ctx.font = `600 52px 'WF Visual Sans', 'Poppins', sans-serif`;
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const headlineY = panY + panH + 32;
  ctx.fillText('Build smarter. Ship faster.', MID_X, headlineY);

  // Subline — monospace URL-style
  ctx.font = `13px 'Courier New', monospace`;
  ctx.fillStyle = G400;
  ctx.textBaseline = 'top';
  ctx.fillText('webflow.com/integrations/claude', MID_X, headlineY + 66);
  ctx.restore();
}

(async () => {
  await loadFonts();
  draw();
})();

document.getElementById('dl').addEventListener('click', () => {
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'webflow-claude-og.png';
    a.click();
  }, 'image/png');
});
