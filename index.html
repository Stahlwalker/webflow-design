<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webflow Asset Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  height: 100vh;
  background: #0d0d0d;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  font-size: 13px;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 272px;
  min-width: 272px;
  background: #141414;
  border-right: 1px solid #242424;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid #242424;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-header img { height: 18px; }

.sidebar-header .title {
  font-size: 12px;
  font-weight: 600;
  color: #898989;
  letter-spacing: 0.04em;
}

.section {
  padding: 14px 16px;
  border-bottom: 1px solid #1e1e1e;
}

.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #484848;
  margin-bottom: 10px;
}

/* ── Formats ── */
.format-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}

.format-btn {
  background: #1c1c1c;
  border: 1px solid #2a2a2a;
  border-radius: 7px;
  padding: 9px 8px 7px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.15s, background 0.15s;
  color: #898989;
  user-select: none;
}

.format-btn:hover { border-color: #3a3a3a; background: #222; color: #d8d8d8; }
.format-btn.active { border-color: #146EF5; background: rgba(20,110,245,0.08); color: #fff; }

.format-btn .f-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 26px;
  margin-bottom: 6px;
}

.format-btn .f-rect {
  background: #333;
  border-radius: 2px;
  transition: background 0.15s;
}

.format-btn.active .f-rect { background: #146EF5; opacity: 0.7; }
.format-btn:hover:not(.active) .f-rect { background: #444; }

.format-btn .f-name {
  font-size: 10px;
  font-weight: 600;
  margin-bottom: 2px;
  color: inherit;
}

.format-btn .f-dims {
  font-size: 9px;
  color: #484848;
}

.format-btn.active .f-dims { color: rgba(20,110,245,0.7); }

/* ── Theme ── */
.theme-row {
  display: flex;
  gap: 5px;
}

.theme-btn {
  flex: 1;
  padding: 7px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  transition: border-color 0.15s;
  user-select: none;
}

.theme-btn.dark  { background: #080808; color: #fff; border-color: #333; }
.theme-btn.light { background: #fff;    color: #080808; border-color: #ddd; }

.theme-btn.dark.active  { border-color: #146EF5; }
.theme-btn.light.active { border-color: #146EF5; }

/* ── Colors ── */
.color-row {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
}

.color-swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.15s, transform 0.1s;
  position: relative;
}

.color-swatch:hover { transform: scale(1.1); }
.color-swatch.active { border-color: #fff; box-shadow: 0 0 0 1px rgba(255,255,255,0.3); }

/* ── Fields ── */
.field { margin-bottom: 9px; }
.field:last-child { margin-bottom: 0; }

.field label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #4a4a4a;
  margin-bottom: 4px;
}

.field input,
.field textarea {
  width: 100%;
  background: #1c1c1c;
  border: 1px solid #2a2a2a;
  border-radius: 6px;
  padding: 6px 9px;
  color: #e8e8e8;
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
  resize: none;
}

.field input:focus,
.field textarea:focus { border-color: #146EF5; }
.field input::placeholder,
.field textarea::placeholder { color: #3a3a3a; }

.field textarea { line-height: 1.4; }

/* ── Logo options ── */
.logo-row {
  display: flex;
  gap: 5px;
}

.logo-btn {
  flex: 1;
  padding: 6px 4px;
  background: #1c1c1c;
  border: 1px solid #2a2a2a;
  border-radius: 6px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  color: #757575;
  text-align: center;
  transition: all 0.15s;
  user-select: none;
}

.logo-btn:hover { border-color: #3a3a3a; color: #d8d8d8; }
.logo-btn.active { border-color: #146EF5; background: rgba(20,110,245,0.08); color: #fff; }

/* ── Layout selector ── */
.layout-row {
  display: flex;
  gap: 5px;
}

.layout-btn {
  flex: 1;
  padding: 6px 4px;
  background: #1c1c1c;
  border: 1px solid #2a2a2a;
  border-radius: 6px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  color: #757575;
  text-align: center;
  transition: all 0.15s;
  user-select: none;
}

.layout-btn:hover { border-color: #3a3a3a; color: #d8d8d8; }
.layout-btn.active { border-color: #146EF5; background: rgba(20,110,245,0.08); color: #fff; }

/* ── Logo library ── */
.lib-empty {
  font-size: 11px;
  color: #3a3a3a;
  text-align: center;
  padding: 12px 0 6px;
}

.lib-company {
  margin-bottom: 8px;
}

.lib-company-name {
  font-size: 10px;
  font-weight: 600;
  color: #575757;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.lib-logo-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.lib-logo-item {
  position: relative;
  width: 48px;
  height: 36px;
  background: #1e1e1e;
  border: 1px solid #2a2a2a;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s;
  overflow: hidden;
}

.lib-logo-item:hover { border-color: #444; }
.lib-logo-item.active { border-color: #146EF5; background: rgba(20,110,245,0.08); }

.lib-logo-item img {
  max-width: 38px;
  max-height: 26px;
  object-fit: contain;
}

.lib-logo-item .lib-del {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 14px;
  height: 14px;
  background: #333;
  border-radius: 50%;
  font-size: 9px;
  color: #999;
  display: none;
  align-items: center;
  justify-content: center;
  line-height: 1;
  cursor: pointer;
  z-index: 2;
}

.lib-logo-item:hover .lib-del { display: flex; }
.lib-logo-item .lib-del:hover { background: #EE1D36; color: #fff; }

.lib-logo-item .lib-variant {
  position: absolute;
  bottom: 2px;
  left: 0; right: 0;
  font-size: 8px;
  color: #484848;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 2px;
}

.lib-logo-item.active .lib-variant { color: #146EF5; }

/* Upload zone */
.upload-zone {
  border: 1px dashed #2a2a2a;
  border-radius: 7px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  margin-top: 4px;
}

.upload-zone:hover, .upload-zone.dragover {
  border-color: #146EF5;
  background: rgba(20,110,245,0.04);
}

.upload-zone span {
  font-size: 11px;
  color: #484848;
  display: block;
  pointer-events: none;
}

.upload-zone.dragover span { color: #146EF5; }

/* Add logo form */
.add-logo-form {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.add-logo-form input {
  width: 100%;
  background: #1c1c1c;
  border: 1px solid #2a2a2a;
  border-radius: 6px;
  padding: 6px 9px;
  color: #e8e8e8;
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}

.add-logo-form input:focus { border-color: #146EF5; }
.add-logo-form input::placeholder { color: #3a3a3a; }

.add-logo-preview {
  height: 36px;
  object-fit: contain;
  border-radius: 5px;
  background: #1a1a1a;
  padding: 4px;
  border: 1px solid #2a2a2a;
}

.add-btn-row {
  display: flex;
  gap: 5px;
}

.lib-save-btn {
  flex: 1;
  padding: 7px;
  background: #146EF5;
  border: none;
  border-radius: 6px;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}

.lib-save-btn:hover { background: #2578ff; }

.lib-cancel-btn {
  padding: 7px 10px;
  background: #222;
  border: 1px solid #333;
  border-radius: 6px;
  color: #898989;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.lib-cancel-btn:hover { color: #fff; border-color: #555; }

/* Active partner bar */
.active-partner-bar {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 8px;
  background: rgba(20,110,245,0.08);
  border: 1px solid rgba(20,110,245,0.25);
  border-radius: 6px;
  margin-bottom: 8px;
}

.active-partner-bar img {
  height: 18px;
  max-width: 60px;
  object-fit: contain;
}

.active-partner-bar .ap-name {
  flex: 1;
  font-size: 11px;
  color: #898989;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.active-partner-bar .ap-clear {
  font-size: 14px;
  color: #484848;
  cursor: pointer;
  transition: color 0.15s;
  line-height: 1;
}

.active-partner-bar .ap-clear:hover { color: #EE1D36; }

.partner-pos-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  margin-bottom: 8px;
}

.pos-btn {
  padding: 5px 4px;
  background: #1c1c1c;
  border: 1px solid #2a2a2a;
  border-radius: 5px;
  cursor: pointer;
  font-size: 9px;
  font-weight: 600;
  color: #575757;
  text-align: center;
  transition: all 0.15s;
  user-select: none;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.pos-btn:hover { border-color: #3a3a3a; color: #d8d8d8; }
.pos-btn.active { border-color: #146EF5; background: rgba(20,110,245,0.08); color: #fff; }

.size-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.size-row label {
  font-size: 10px;
  color: #484848;
  white-space: nowrap;
}

.size-row input[type=range] {
  flex: 1;
  accent-color: #146EF5;
  cursor: pointer;
}

/* ── Download ── */
.download-area {
  padding: 14px 16px;
  margin-top: auto;
  border-top: 1px solid #242424;
}

.download-btn {
  width: 100%;
  padding: 10px;
  background: #146EF5;
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  font-family: inherit;
}

.download-btn:hover { background: #2578ff; }
.download-btn:active { background: #0e5fd4; }

.dim-label {
  text-align: center;
  font-size: 10px;
  color: #3a3a3a;
  margin-top: 7px;
  letter-spacing: 0.04em;
}

/* ── Canvas area ── */
.main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  overflow: hidden;
  background: #0a0a0a;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 32px 32px;
}

.canvas-wrap {
  position: relative;
  box-shadow: 0 0 0 1px #2a2a2a, 0 24px 80px rgba(0,0,0,0.7);
  border-radius: 2px;
  overflow: hidden;
  transition: all 0.2s ease;
}

canvas { display: block; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1c1c1c;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 9px 14px;
  font-size: 12px;
  color: #d8d8d8;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateY(0); }

/* ── Loading ── */
.font-status {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: #1c1c1c;
  border: 1px solid #333;
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 11px;
  color: #757575;
  opacity: 0;
  transition: opacity 0.3s;
}

.font-status.show { opacity: 1; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <img src="webflow-brand/logos/Full_Logo_Blue_White.png" alt="Webflow" onerror="this.style.display='none'">
    <span class="title">Asset Builder</span>
  </div>

  <div class="section">
    <div class="section-label">Format</div>
    <div class="format-grid" id="formatGrid"></div>
  </div>

  <div class="section">
    <div class="section-label">Layout</div>
    <div class="layout-row">
      <div class="layout-btn active" data-layout="default">Default</div>
      <div class="layout-btn" data-layout="centered">Centered</div>
      <div class="layout-btn" data-layout="split">Split</div>
      <div class="layout-btn" data-layout="vs">VS</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Theme</div>
    <div class="theme-row">
      <div class="theme-btn dark active" data-theme="dark">Dark</div>
      <div class="theme-btn light" data-theme="light">Light</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Accent Color</div>
    <div class="color-row" id="colorPalette"></div>
  </div>

  <div class="section">
    <div class="section-label">Content</div>
    <div class="field">
      <label>Eyebrow / Tag</label>
      <input type="text" id="eyebrow" placeholder="BLOG POST" maxlength="50">
    </div>
    <div class="field">
      <label>Headline</label>
      <textarea id="headline" rows="3" placeholder="Your headline goes here"></textarea>
    </div>
    <div class="field">
      <label>Subtitle</label>
      <textarea id="subtitle" rows="2" placeholder="Supporting text"></textarea>
    </div>
    <div class="field">
      <label>Byline</label>
      <input type="text" id="byline" placeholder="webflow.com">
    </div>
    <div class="field" id="vsField" style="display:none">
      <label>VS Text</label>
      <input type="text" id="vsText" placeholder="VS" maxlength="10">
    </div>
  </div>

  <div class="section">
    <div class="section-label">Webflow Logo</div>
    <div class="logo-row">
      <div class="logo-btn active" data-logo="full">Full</div>
      <div class="logo-btn" data-logo="mark">Mark</div>
      <div class="logo-btn" data-logo="none">None</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Logo Library</div>

    <!-- Library browser -->
    <div id="logoLibrary"></div>

    <!-- Upload zone -->
    <div class="upload-zone" id="uploadZone">
      <span>↑ Drop image or click to add logo</span>
      <input type="file" id="libFileInput" accept="image/*" style="display:none">
    </div>

    <!-- Add form (shown after file selected) -->
    <div class="add-logo-form" id="addLogoForm" style="display:none">
      <img class="add-logo-preview" id="addLogoPreview" src="" alt="">
      <input type="text" id="companyInput" placeholder="Company (e.g. Anthropic)" list="companySuggestions" autocomplete="off">
      <datalist id="companySuggestions"></datalist>
      <input type="text" id="variantInput" placeholder="Variant (e.g. Icon, Wordmark)">
      <div class="add-btn-row">
        <button class="lib-save-btn" id="libSaveBtn">Save to Library</button>
        <button class="lib-cancel-btn" id="libCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Active partner controls (shown when a library logo is active) -->
  <div class="section" id="partnerControlsSection" style="display:none">
    <div class="section-label">Logo Placement</div>
    <div class="active-partner-bar" id="activePartnerBar">
      <img id="activePartnerThumb" src="" alt="">
      <span class="ap-name" id="activePartnerName"></span>
      <span class="ap-clear" id="apClear" title="Remove from canvas">×</span>
    </div>
    <div class="partner-pos-row">
      <div class="pos-btn" data-pos="top-left">↖ Top L</div>
      <div class="pos-btn active" data-pos="top-right">↗ Top R</div>
      <div class="pos-btn" data-pos="bottom-left">↙ Bot L</div>
      <div class="pos-btn" data-pos="bottom-right">↘ Bot R</div>
      <div class="pos-btn" data-pos="center">⊙ Center</div>
      <div class="pos-btn" data-pos="bottom-center">↓ Bot C</div>
    </div>
    <div class="size-row">
      <label>Size</label>
      <input type="range" id="partnerSize" min="20" max="200" value="60">
    </div>
  </div>

  <div class="download-area">
    <button class="download-btn" id="downloadBtn">↓ Download PNG</button>
    <div class="dim-label" id="dimLabel">1200 × 630 px</div>
  </div>
</div>

<div class="main">
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="font-status" id="fontStatus">Loading brand fonts…</div>

<script>
// ─── Formats ──────────────────────────────────────────────────────────────────
const FORMATS = [
  { id: 'og',        name: 'OG / Blog',        w: 1200, h: 630,  icon: [38, 20] },
  { id: 'tw-post',   name: 'Twitter Post',      w: 1200, h: 628,  icon: [38, 20] },
  { id: 'tw-header', name: 'Twitter Header',    w: 1500, h: 500,  icon: [38, 13] },
  { id: 'li-post',   name: 'LinkedIn Post',     w: 1200, h: 627,  icon: [38, 20] },
  { id: 'li-banner', name: 'LinkedIn Banner',   w: 1584, h: 396,  icon: [38,  9] },
  { id: 'yt-thumb',  name: 'YT Thumbnail',      w: 1280, h: 720,  icon: [38, 22] },
  { id: 'shorts',    name: 'YT Shorts',         w: 1080, h: 1920, icon: [21, 38] },
  { id: 'tiktok',    name: 'TikTok',            w: 1080, h: 1920, icon: [21, 38] },
];

const COLORS = [
  { name: 'Blue',   hex: '#146EF5' },
  { name: 'Purple', hex: '#7A3DFF' },
  { name: 'Pink',   hex: '#ED52CB' },
  { name: 'Red',    hex: '#EE1D36' },
  { name: 'Orange', hex: '#FF6B00' },
  { name: 'Green',  hex: '#00D722' },
  { name: 'Yellow', hex: '#FFAE13' },
];

// WF_LOGOS keys map to WF_LOGOS constant (base64 embedded above)
const LOGO_KEYS = {
  'full-white':  'Full_Logo_Blue_White',
  'full-black':  'Full_Logo_Blue_Black',
  'mark-blue':   'Mark_Logo_Blue',
  'mark-white':  'Mark_Logo_White',
  'mark-black':  'Mark_Logo_Black',
};

// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  format:        'og',
  layout:        'default',
  theme:         'dark',
  accent:        '#146EF5',
  eyebrow:       '',
  headline:      'Build for the web\nwithout limits',
  subtitle:      '',
  byline:        'webflow.com',
  vsText:        'VS',
  logo:          'full',
  partnerImg:    null,   // HTMLImageElement
  partnerLabel:  '',
  partnerPos:    'top-right',
  partnerSize:   60,     // height in px at 1x (scales with canvas)
};

// ─── Asset cache ──────────────────────────────────────────────────────────────
const imgCache = {};
const fontsLoaded = { ok: false };

function loadImgFromDataURL(dataUrl) {
  if (imgCache[dataUrl]) return Promise.resolve(imgCache[dataUrl]);
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => { imgCache[dataUrl] = img; resolve(img); };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}

async function loadFonts() {
  const defs = [
    ['WFVisualSans',     'WFVisualSans-SemiBold.otf',   '600'],
    ['WFVisualSans',     'WFVisualSans-Medium.otf',      '500'],
    ['WFVisualSans',     'WFVisualSans-Regular.otf',     '400'],
    ['WFVisualSansText', 'WFVisualSans-RegularText.otf', '400'],
    ['WFVisualSansText', 'WFVisualSans-SemiBoldText.otf','600'],
  ];
  await Promise.all(defs.map(([name, file, weight]) => {
    const face = new FontFace(name, `url(webflow-brand/fonts/OTF/${file})`, { weight });
    return face.load().then(f => document.fonts.add(f)).catch(() => {});
  }));
  fontsLoaded.ok = true;
}

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const wrap    = document.getElementById('canvasWrap');

function getFmt() { return FORMATS.find(f => f.id === S.format) || FORMATS[0]; }

function scalePreview() {
  const fmt   = getFmt();
  const main  = document.querySelector('.main');
  const maxW  = main.clientWidth  - 80;
  const maxH  = main.clientHeight - 80;
  const scale = Math.min(maxW / fmt.w, maxH / fmt.h, 1);
  canvas.width  = fmt.w;
  canvas.height = fmt.h;
  const dw = Math.round(fmt.w * scale);
  const dh = Math.round(fmt.h * scale);
  canvas.style.width  = dw + 'px';
  canvas.style.height = dh + 'px';
  document.getElementById('dimLabel').textContent = `${fmt.w} × ${fmt.h} px`;
}

// ─── Drawing helpers ──────────────────────────────────────────────────────────
function headingFont(size) {
  const fam = fontsLoaded.ok ? '"WFVisualSans", Poppins, sans-serif' : 'Poppins, sans-serif';
  return `600 ${size}px/${size * 1.04}px ${fam}`;
}

function bodyFont(size) {
  const fam = fontsLoaded.ok ? '"WFVisualSansText", Inter, sans-serif' : 'Inter, sans-serif';
  return `400 ${size}px/${size * 1.6}px ${fam}`;
}

function measureWrappedLines(text, maxW, font) {
  ctx.save();
  ctx.font = font;
  const words = text.split(/\s+/).filter(Boolean);
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
    else cur = test;
  }
  if (cur) lines.push(cur);
  ctx.restore();
  return lines;
}

function drawText(text, x, y, maxW, font, color, lh, align = 'left') {
  ctx.save();
  ctx.font = font;
  ctx.fillStyle = color;
  ctx.textAlign = align;
  const lines = measureWrappedLines(text, maxW, font);
  lines.forEach((line, i) => ctx.fillText(line, x, y + i * lh));
  ctx.restore();
  return lines.length;
}

function drawRoundRect(x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.fillStyle = fill;
  ctx.fill();
}

function drawAccentCorner(w, h, accent, opacity = 0.1) {
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.fillStyle = accent;
  // Two overlapping triangles, bottom-right
  const s = Math.round(Math.min(w, h) * 0.42);
  ctx.beginPath();
  ctx.moveTo(w, h); ctx.lineTo(w - s, h); ctx.lineTo(w, h - s * 0.55);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w, h); ctx.lineTo(w, h - s * 0.25); ctx.lineTo(w - s * 0.45, h);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawAccentCornerTop(w, h, accent, opacity = 0.08) {
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.fillStyle = accent;
  const s = Math.round(w * 0.22);
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(s, 0); ctx.lineTo(0, s * 0.6);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

async function drawLogo(w, h, pad, theme, logoType, isPortrait) {
  if (logoType === 'none') return;
  const variant = logoType === 'mark'
    ? (theme === 'dark' ? 'mark-white' : 'mark-black')
    : (theme === 'dark' ? 'full-white' : 'full-black');
  const dataUrl = WF_LOGOS[LOGO_KEYS[variant]];
  if (!dataUrl) return;
  const img = await loadImgFromDataURL(dataUrl);
  if (!img) return;
  const logoH = isPortrait ? Math.round(h * 0.026) : Math.round(h * 0.052);
  const logoW = Math.round(img.naturalWidth * (logoH / img.naturalHeight));
  ctx.drawImage(img, pad, pad, logoW, logoH);
}

// ─── Layout: Default (left-aligned, bottom-anchored text) ────────────────────
function drawDefault(w, h, pad, textW, fg, fgMuted, accent, { eyebrow, headline, subtitle, byline }, isPortrait) {
  const unit = isPortrait ? w : h;
  let y = isPortrait ? h * 0.38 : h * 0.33;

  if (eyebrow) {
    const sz = Math.round(unit * (isPortrait ? 0.038 : 0.032));
    ctx.save();
    ctx.font = `600 ${sz}px ${fontsLoaded.ok ? '"WFVisualSans"' : 'Poppins'}, sans-serif`;
    ctx.fillStyle = accent;
    try { ctx.letterSpacing = Math.round(sz * 0.08) + 'px'; } catch(e){}
    ctx.fillText(eyebrow.toUpperCase(), pad, y);
    try { ctx.letterSpacing = '0px'; } catch(e){}
    ctx.restore();
    y += sz * 2;
  }

  if (headline) {
    const sz  = Math.round(unit * (isPortrait ? 0.095 : 0.105));
    const lh  = sz * 1.04;
    const mw  = isPortrait ? textW : textW * 0.8;
    const n   = drawText(headline, pad, y, mw, headingFont(sz), fg, lh);
    y += n * lh + sz * 0.45;
  }

  if (subtitle) {
    const sz  = Math.round(unit * (isPortrait ? 0.044 : 0.038));
    const lh  = sz * 1.5;
    const mw  = isPortrait ? textW * 0.9 : textW * 0.65;
    const n   = drawText(subtitle, pad, y, mw, bodyFont(sz), fgMuted, lh);
    y += n * lh + sz * 0.5;
  }

  if (byline) {
    const sz = Math.round(unit * (isPortrait ? 0.033 : 0.028));
    drawText(byline, pad, h - pad, textW, bodyFont(sz), fgMuted, sz * 1.6);
  }
}

// ─── Layout: Centered ─────────────────────────────────────────────────────────
function drawCentered(w, h, pad, textW, fg, fgMuted, accent, { eyebrow, headline, subtitle, byline }, isPortrait) {
  const unit = isPortrait ? w : h;
  const cx   = w / 2;

  // Measure total block height first
  const eyebrowSz   = eyebrow   ? Math.round(unit * (isPortrait ? 0.036 : 0.030)) : 0;
  const headlineSz  = headline  ? Math.round(unit * (isPortrait ? 0.088 : 0.098)) : 0;
  const subtitleSz  = subtitle  ? Math.round(unit * (isPortrait ? 0.042 : 0.036)) : 0;

  const mw = isPortrait ? textW : textW * 0.8;
  const hLines = headline ? measureWrappedLines(headline, mw, headingFont(headlineSz)).length : 0;
  const sLines = subtitle ? measureWrappedLines(subtitle, mw * 0.85, bodyFont(subtitleSz)).length : 0;

  const totalH =
    (eyebrow  ? eyebrowSz  * 2 : 0) +
    (headline ? hLines * headlineSz * 1.04 + headlineSz * 0.4 : 0) +
    (subtitle ? sLines * subtitleSz * 1.5 : 0);

  let y = (h - totalH) / 2 + (isPortrait ? 0 : h * 0.05);

  if (eyebrow) {
    ctx.save();
    ctx.font = `600 ${eyebrowSz}px ${fontsLoaded.ok ? '"WFVisualSans"' : 'Poppins'}, sans-serif`;
    ctx.fillStyle = accent;
    ctx.textAlign = 'center';
    try { ctx.letterSpacing = Math.round(eyebrowSz * 0.08) + 'px'; } catch(e){}
    ctx.fillText(eyebrow.toUpperCase(), cx, y);
    try { ctx.letterSpacing = '0px'; } catch(e){}
    ctx.restore();
    y += eyebrowSz * 2;
  }

  if (headline) {
    const lh = headlineSz * 1.04;
    const lines = measureWrappedLines(headline, mw, headingFont(headlineSz));
    ctx.save();
    ctx.font    = headingFont(headlineSz);
    ctx.fillStyle = fg;
    ctx.textAlign = 'center';
    lines.forEach((l, i) => ctx.fillText(l, cx, y + i * lh));
    ctx.restore();
    y += lines.length * lh + headlineSz * 0.4;
  }

  if (subtitle) {
    const lh = subtitleSz * 1.5;
    const lines = measureWrappedLines(subtitle, mw * 0.85, bodyFont(subtitleSz));
    ctx.save();
    ctx.font    = bodyFont(subtitleSz);
    ctx.fillStyle = fgMuted;
    ctx.textAlign = 'center';
    lines.forEach((l, i) => ctx.fillText(l, cx, y + i * lh));
    ctx.restore();
  }

  if (byline) {
    const sz = Math.round(unit * (isPortrait ? 0.030 : 0.026));
    ctx.save();
    ctx.font = bodyFont(sz);
    ctx.fillStyle = fgMuted;
    ctx.textAlign = 'center';
    ctx.fillText(byline, cx, h - pad);
    ctx.restore();
  }
}

// ─── Layout: Split (headline left, accent block right) ───────────────────────
function drawSplit(w, h, pad, textW, fg, fgMuted, accent, { eyebrow, headline, subtitle, byline }, isPortrait, theme) {
  const unit = isPortrait ? w : h;

  if (!isPortrait) {
    // Accent panel right half
    const panelW = Math.round(w * 0.36);
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = accent;
    ctx.fillRect(w - panelW, 0, panelW, h);
    ctx.restore();

    // Vertical accent line
    ctx.fillStyle = accent;
    ctx.fillRect(w - panelW, 0, 3, h);
  }

  const colW = isPortrait ? textW : Math.round(w * 0.55);
  let y = isPortrait ? h * 0.36 : h * 0.30;

  if (eyebrow) {
    const sz = Math.round(unit * (isPortrait ? 0.036 : 0.030));
    ctx.save();
    ctx.font = `600 ${sz}px ${fontsLoaded.ok ? '"WFVisualSans"' : 'Poppins'}, sans-serif`;
    ctx.fillStyle = accent;
    try { ctx.letterSpacing = Math.round(sz * 0.08) + 'px'; } catch(e){}
    ctx.fillText(eyebrow.toUpperCase(), pad, y);
    try { ctx.letterSpacing = '0px'; } catch(e){}
    ctx.restore();
    y += sz * 2;
  }

  if (headline) {
    const sz = Math.round(unit * (isPortrait ? 0.090 : 0.100));
    const lh = sz * 1.04;
    const n  = drawText(headline, pad, y, colW, headingFont(sz), fg, lh);
    y += n * lh + sz * 0.4;
  }

  if (subtitle) {
    const sz = Math.round(unit * (isPortrait ? 0.040 : 0.036));
    const n  = drawText(subtitle, pad, y, colW * 0.9, bodyFont(sz), fgMuted, sz * 1.5);
    y += n * sz * 1.5;
  }

  if (byline) {
    const sz = Math.round(unit * (isPortrait ? 0.030 : 0.026));
    drawText(byline, pad, h - pad, colW, bodyFont(sz), fgMuted, sz * 1.6);
  }
}

// ─── Partner logo draw ────────────────────────────────────────────────────────
function drawPartnerLogo(w, h, pad) {
  const { partnerImg, partnerPos, partnerSize } = S;
  if (!partnerImg) return;

  const scale = w / 1200; // normalize to OG baseline
  const ph    = Math.round(partnerSize * scale);
  const pw    = Math.round(partnerImg.naturalWidth * (ph / partnerImg.naturalHeight));
  const margin = pad;

  let x, y;
  switch (partnerPos) {
    case 'top-left':      x = margin;          y = margin; break;
    case 'top-right':     x = w - margin - pw; y = margin; break;
    case 'bottom-left':   x = margin;          y = h - margin - ph; break;
    case 'bottom-right':  x = w - margin - pw; y = h - margin - ph; break;
    case 'center':        x = (w - pw) / 2;    y = (h - ph) / 2; break;
    case 'bottom-center': x = (w - pw) / 2;    y = h - margin - ph; break;
    default:              x = w - margin - pw; y = margin;
  }

  ctx.drawImage(partnerImg, x, y, pw, ph);
}

// ─── Logo Library (localStorage) ─────────────────────────────────────────────
const LIB_KEY = 'wf-logo-library';

function libLoad() {
  try { return JSON.parse(localStorage.getItem(LIB_KEY)) || {}; } catch { return {}; }
}

function libSave(data) {
  localStorage.setItem(LIB_KEY, JSON.stringify(data));
}

function libAdd(company, variant, dataUrl) {
  const data = libLoad();
  if (!data[company]) data[company] = [];
  data[company].push({ id: Date.now().toString(36), variant, dataUrl });
  libSave(data);
  renderLibrary();
  toast(`Saved "${variant || company}" to library`);
}

function libRemove(company, id) {
  const data = libLoad();
  if (!data[company]) return;
  data[company] = data[company].filter(e => e.id !== id);
  if (data[company].length === 0) delete data[company];
  libSave(data);
  renderLibrary();
}

function renderLibrary() {
  const el      = document.getElementById('logoLibrary');
  const user    = libLoad();

  // Merge: built-ins first, then user-added companies
  const merged  = {};
  Object.entries(BUILTIN_LOGOS).forEach(([co, logos]) => {
    merged[co] = logos.map(l => ({ ...l, builtin: true }));
  });
  Object.entries(user).forEach(([co, logos]) => {
    merged[co] = [...(merged[co] || []), ...logos.map(l => ({ ...l, builtin: false }))];
  });

  const companies = Object.keys(merged).sort();

  // Update datalist with user company names only
  const dl = document.getElementById('companySuggestions');
  dl.innerHTML = Object.keys(user).sort().map(c => `<option value="${c}">`).join('');

  if (companies.length === 0) {
    el.innerHTML = '<div class="lib-empty">Upload a logo below to get started</div>';
    return;
  }

  el.innerHTML = companies.map(company => `
    <div class="lib-company">
      <div class="lib-company-name">${company}</div>
      <div class="lib-logo-grid">
        ${merged[company].map(entry => `
          <div class="lib-logo-item${S.partnerLabel === company + ':' + entry.id ? ' active' : ''}"
               data-company="${company}" data-id="${entry.id}">
            <img src="${entry.dataUrl}" alt="${entry.variant}">
            <div class="lib-variant">${entry.variant || ''}</div>
            ${!entry.builtin ? `<div class="lib-del" data-company="${company}" data-id="${entry.id}">×</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  // Click to use
  el.querySelectorAll('.lib-logo-item').forEach(item => {
    item.addEventListener('click', e => {
      if (e.target.classList.contains('lib-del')) return;
      const { company, id } = item.dataset;
      const entry = merged[company]?.find(e => e.id === id);
      if (!entry) return;
      setPartnerLogo(entry.dataUrl, company, company + ':' + id);
    });
  });

  // Delete (user logos only)
  el.querySelectorAll('.lib-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      libRemove(btn.dataset.company, btn.dataset.id);
      if (S.partnerLabel === btn.dataset.company + ':' + btn.dataset.id) clearPartner();
    });
  });
}

// Pending upload state
let pendingDataUrl = null;

function stageFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    pendingDataUrl = e.target.result;
    document.getElementById('addLogoPreview').src = pendingDataUrl;
    document.getElementById('addLogoForm').style.display = 'flex';
    document.getElementById('companyInput').focus();
  };
  reader.readAsDataURL(file);
}

function setPartnerLogo(dataUrl, label, key) {
  const img = new Image();
  img.onload = () => {
    S.partnerImg   = img;
    S.partnerLabel = key || label;

    document.getElementById('activePartnerThumb').src = dataUrl;
    document.getElementById('activePartnerName').textContent = label;
    document.getElementById('partnerControlsSection').style.display = 'block';

    renderLibrary(); // refresh active state
    scheduleDraw();
  };
  img.src = dataUrl;
}

function clearPartner() {
  S.partnerImg   = null;
  S.partnerLabel = '';
  document.getElementById('partnerControlsSection').style.display = 'none';
  renderLibrary();
  scheduleDraw();
}

// ─── Layout: VS / Collab ──────────────────────────────────────────────────────
async function drawVS(w, h, pad, fg, fgMuted, accent, theme) {
  const { vsText, partnerImg, partnerLabel, headline } = S;
  const isPortrait = h > w;
  const midX = w / 2;

  const hasHeadline = headline && headline.trim();

  // Large icons — 36% of shorter dimension (portrait: 30%)
  const iconSize = Math.round(Math.min(w, h) * (isPortrait ? 0.30 : 0.36));

  // Logo row vertical center — shift up when headline is below
  const logoRowY = hasHeadline
    ? Math.round(h * 0.40)
    : Math.round(h * 0.47);

  // Horizontal placement: icons equidistant from center with gap for operator
  const spacing = Math.round(iconSize * 0.52);
  const leftCX  = midX - spacing - Math.round(iconSize / 2);
  const rightCX = midX + spacing + Math.round(iconSize / 2);

  // ── Helper: draw image centered at (cx, cy) constrained to iconSize ──
  function placeIcon(img, cx, cy) {
    const scale = Math.min(iconSize / img.naturalWidth, iconSize / img.naturalHeight);
    const lw = Math.round(img.naturalWidth  * scale);
    const lh = Math.round(img.naturalHeight * scale);
    ctx.drawImage(img, Math.round(cx - lw / 2), Math.round(cy - lh / 2), lw, lh);
    return lh;
  }

  const labelSz   = Math.round(h * 0.022);
  const labelFont = `600 ${labelSz}px ${fontsLoaded.ok ? '"WFVisualSans"' : 'Poppins'}, sans-serif`;

  // ── Left: Webflow blue mark ──
  const wfImg = await loadImgFromDataURL(WF_LOGOS['Mark_Logo_Blue']);
  if (wfImg) {
    const renderedH = placeIcon(wfImg, leftCX, logoRowY);
    ctx.save();
    ctx.font = labelFont;
    ctx.fillStyle = fgMuted;
    ctx.textAlign = 'center';
    ctx.fillText('Webflow', leftCX, Math.round(logoRowY + renderedH / 2 + labelSz * 1.7));
    ctx.restore();
  }

  // ── Center: operator (VS, +, ×, etc.) — plain typographic text ──
  if (vsText) {
    const opSz = Math.round(iconSize * 0.26);
    ctx.save();
    ctx.font = `400 ${opSz}px ${fontsLoaded.ok ? '"WFVisualSans"' : 'Poppins'}, sans-serif`;
    ctx.fillStyle = fgMuted;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(vsText, midX, logoRowY);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // ── Right: Partner logo ──
  if (partnerImg) {
    const renderedH = placeIcon(partnerImg, rightCX, logoRowY);
    const rawLabel = partnerLabel ? partnerLabel.split(':')[0] : '';
    if (rawLabel) {
      ctx.save();
      ctx.font = labelFont;
      ctx.fillStyle = fgMuted;
      ctx.textAlign = 'center';
      ctx.fillText(rawLabel, rightCX, Math.round(logoRowY + renderedH / 2 + labelSz * 1.7));
      ctx.restore();
    }
  } else {
    const sz = Math.round(h * 0.025);
    ctx.save();
    ctx.font = `400 ${sz}px ${fontsLoaded.ok ? '"WFVisualSans"' : 'Poppins'}, sans-serif`;
    ctx.fillStyle = fgMuted;
    ctx.globalAlpha = 0.35;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('+ partner logo', rightCX, logoRowY);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // ── Headline below logo row ──
  if (hasHeadline) {
    const hlSz = Math.round(Math.min(w, h) * (isPortrait ? 0.050 : 0.058));
    const hlY  = Math.round(logoRowY + iconSize * 0.56 + hlSz * 2.0);
    ctx.save();
    ctx.font = `600 ${hlSz}px ${fontsLoaded.ok ? '"WFVisualSans"' : 'Poppins'}, sans-serif`;
    ctx.fillStyle = fg;
    ctx.textAlign = 'center';
    ctx.fillText(headline.replace(/\n/g, ' '), midX, hlY);
    ctx.restore();
  }

  // ── Byline ──
  if (S.byline) {
    const sz = Math.round(h * 0.026);
    ctx.save();
    ctx.font = bodyFont(sz);
    ctx.fillStyle = fgMuted;
    ctx.textAlign = 'center';
    ctx.fillText(S.byline, midX, h - pad);
    ctx.restore();
  }
}

// ─── Main draw ────────────────────────────────────────────────────────────────
async function draw() {
  const fmt  = getFmt();
  const { w, h } = fmt;
  const { theme, accent, eyebrow, headline, subtitle, byline, logo, layout } = S;
  const isPortrait = h > w;

  const bg      = theme === 'dark' ? '#080808' : '#FFFFFF';
  const fg      = theme === 'dark' ? '#FFFFFF'  : '#080808';
  const fgMuted = theme === 'dark' ? '#ABABAB'  : '#5A5A5A';
  const pad     = Math.round(Math.min(w, h) * (isPortrait ? 0.072 : 0.082));
  const textW   = w - pad * 2;

  // Background
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Accent top bar
  ctx.fillStyle = accent;
  ctx.fillRect(0, 0, w, Math.max(4, Math.round(h * 0.005)));

  // Decorative corner shapes
  drawAccentCorner(w, h, accent, theme === 'dark' ? 0.09 : 0.06);
  if (layout !== 'split') {
    drawAccentCornerTop(w, h, accent, theme === 'dark' ? 0.06 : 0.04);
  }

  // Webflow logo
  await drawLogo(w, h, pad, theme, logo, isPortrait);

  // Partner logo (skip in VS — that layout renders it centered)
  if (layout !== 'vs') drawPartnerLogo(w, h, pad);

  // Content
  const content = { eyebrow, headline, subtitle, byline };

  if (layout === 'vs') {
    await drawVS(w, h, pad, fg, fgMuted, accent, theme);
  } else if (layout === 'centered') {
    drawCentered(w, h, pad, textW, fg, fgMuted, accent, content, isPortrait);
  } else if (layout === 'split') {
    drawSplit(w, h, pad, textW, fg, fgMuted, accent, content, isPortrait, theme);
  } else {
    drawDefault(w, h, pad, textW, fg, fgMuted, accent, content, isPortrait);
  }
}

let drawTimer;
function scheduleDraw() { clearTimeout(drawTimer); drawTimer = setTimeout(draw, 40); }

// ─── UI ───────────────────────────────────────────────────────────────────────
function buildFormats() {
  const grid = document.getElementById('formatGrid');
  FORMATS.forEach(fmt => {
    const btn = document.createElement('div');
    btn.className = 'format-btn' + (fmt.id === S.format ? ' active' : '');
    btn.dataset.id = fmt.id;
    btn.innerHTML = `
      <div class="f-icon">
        <div class="f-rect" style="width:${fmt.icon[0]}px;height:${fmt.icon[1]}px"></div>
      </div>
      <div class="f-name">${fmt.name}</div>
      <div class="f-dims">${fmt.w}×${fmt.h}</div>
    `;
    btn.addEventListener('click', () => {
      S.format = fmt.id;
      document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      scalePreview();
      draw();
    });
    grid.appendChild(btn);
  });
}

function buildColors() {
  const row = document.getElementById('colorPalette');
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c.hex === S.accent ? ' active' : '');
    sw.style.background = c.hex;
    sw.title = c.name;
    sw.addEventListener('click', () => {
      S.accent = c.hex;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      scheduleDraw();
    });
    row.appendChild(sw);
  });
}

function bindControls() {
  // Theme
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      S.theme = btn.dataset.theme;
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      scheduleDraw();
    });
  });

  // Layout
  document.querySelectorAll('.layout-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      S.layout = btn.dataset.layout;
      document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      scheduleDraw();
    });
  });

  // Logo
  document.querySelectorAll('.logo-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      S.logo = btn.dataset.logo;
      document.querySelectorAll('.logo-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      scheduleDraw();
    });
  });

  // Text inputs
  ['eyebrow', 'headline', 'subtitle', 'byline', 'vsText'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.value = S[id] || '';
    el.addEventListener('input', () => { S[id] = el.value; scheduleDraw(); });
  });

  // Show VS field only when VS layout active
  document.querySelectorAll('.layout-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('vsField').style.display =
        btn.dataset.layout === 'vs' ? 'block' : 'none';
    });
  });

  // Download
  document.getElementById('downloadBtn').addEventListener('click', () => {
    const fmt = getFmt();
    draw().then(() => {
      canvas.toBlob(blob => {
        if (!blob) { toast('Export failed — try a different browser'); return; }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `webflow-${S.format}-${Date.now()}.png`;
        a.click();
        URL.revokeObjectURL(url);
        toast(`Saved ${fmt.w}×${fmt.h} PNG`);
      }, 'image/png');
    });
  });

  // ── Logo library ──
  const zone      = document.getElementById('uploadZone');
  const fileInput = document.getElementById('libFileInput');

  zone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) { stageFile(e.target.files[0]); fileInput.value = ''; }
  });
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) stageFile(file);
  });

  document.getElementById('libSaveBtn').addEventListener('click', () => {
    const company = document.getElementById('companyInput').value.trim();
    const variant = document.getElementById('variantInput').value.trim();
    if (!company) { document.getElementById('companyInput').focus(); return; }
    if (!pendingDataUrl) return;
    libAdd(company, variant, pendingDataUrl);
    pendingDataUrl = null;
    document.getElementById('addLogoForm').style.display = 'none';
    document.getElementById('companyInput').value = '';
    document.getElementById('variantInput').value = '';
  });

  document.getElementById('libCancelBtn').addEventListener('click', () => {
    pendingDataUrl = null;
    document.getElementById('addLogoForm').style.display = 'none';
    document.getElementById('companyInput').value = '';
    document.getElementById('variantInput').value = '';
  });

  document.getElementById('apClear').addEventListener('click', clearPartner);

  // Position
  document.querySelectorAll('.pos-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      S.partnerPos = btn.dataset.pos;
      document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      scheduleDraw();
    });
  });

  // Size
  document.getElementById('partnerSize').addEventListener('input', e => {
    S.partnerSize = parseInt(e.target.value);
    scheduleDraw();
  });

  // Resize
  window.addEventListener('resize', () => { scalePreview(); draw(); });
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  buildFormats();
  buildColors();
  bindControls();
  renderLibrary();
  scalePreview();

  // Initial draw with system fonts
  await draw();

  // Load brand fonts, then redraw
  const status = document.getElementById('fontStatus');
  status.classList.add('show');
  try {
    await loadFonts();
    await draw();
    status.textContent = 'Brand fonts loaded';
    setTimeout(() => status.classList.remove('show'), 1200);
  } catch(e) {
    status.textContent = 'Using fallback fonts';
    setTimeout(() => status.classList.remove('show'), 2000);
  }
})();
</script>
</body>
</html>
